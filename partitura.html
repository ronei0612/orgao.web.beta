<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partitura em Tela Cheia</title>
    <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.5/build/cjs/vexflow.js"></script>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            overflow-x: auto; /* Permite rolar para o lado se a partitura for longa */
            overflow-y: hidden;
            display: flex;
            align-items: center; /* Centraliza a pauta verticalmente na tela */
            min-height: 100vh;
        }

        #output {
            /* Deixa a partitura livre para crescer na horizontal */
            min-width: max-content;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div id="output"></div>

    <script>
        const outputDiv = document.getElementById('output');

        // Adicionado Accidental para tratar os Sustenidos (#) e Bemóis (b)
        const { Renderer, Stave, StaveNote, Voice, Formatter, ChordSymbol, BarNote, Annotation, Accidental } = Vex.Flow;

        // Função que traduz a nossa string compacta para os objetos do VexFlow
        function normalizeItem(item) {
            let str = String(item).trim();
            let chord = "", lyric = "", bar = false;

            // 1. Extrai a Cifra[X]
            if (str.startsWith('[')) {
                let closeIdx = str.indexOf(']');
                if (closeIdx !== -1) {
                    chord = str.substring(1, closeIdx);
                    str = str.substring(closeIdx + 1);
                }
            }
            // 2. Extrai a Barra de Compasso |
            if (str.endsWith('|')) {
                bar = true;
                str = str.slice(0, -1);
            }
            // 3. Extrai a Letra @...
            if (str.includes('@')) {
                let parts = str.split('@');
                lyric = parts[1];
                str = parts[0];
            }

            // 4. O restante são as notas separadas por vírgula
            let notes = str.split(',').map(n => n.trim());
            if (notes.length === 1 && notes[0] === "") notes = ["b/4"]; // Evita erros se estiver vazio

            return { notes, chord, lyric, bar };
        }

        function drawMusic(rawNanoData) {
            // Transforma os dados curtinhos (strings) em objetos pro código ler
            const data = rawNanoData.map(normalizeItem);

            outputDiv.innerHTML = '';
            const renderer = new Renderer(outputDiv, Renderer.Backends.SVG);

            // Largura dinâmica: se adapta ao tamanho da tela ou à quantidade de notas
            const width = Math.max(window.innerWidth - 40, data.length * 120);
            renderer.resize(width, 300);
            const context = renderer.getContext();

            const stave = new Stave(10, 100, width - 20);
            stave.addClef("treble");
            stave.setContext(context).draw();

            const tickables = data.flatMap(item => {
                const note = new StaveNote({
                    keys: item.notes,
                    duration: "q",
                });

                // Detecção automática de Sustenidos e Bemóis
                item.notes.forEach((keyName, i) => {
                    const match = keyName.match(/([a-g])([#b])\//i);
                    if (match) {
                        note.addModifier(new Accidental(match[2]), i);
                    }
                });

                if (note.getStem()) note.getStem().hide = true;

                if (item.chord) {
                    note.addModifier(new ChordSymbol().setFont('Arial', 12, 'bold').addText(item.chord));
                }

                if (item.lyric) {
                    const lyric = new Annotation(item.lyric)
                        .setFont('Serif', 12, 'italic')
                        .setVerticalJustification(Annotation.VerticalJustify.BOTTOM);

                    note.addModifier(lyric);
                }

                return item.bar ? [note, new BarNote()] : [note];
            });

            const voice = new Voice({ num_beats: data.length, beat_value: 4 });
            voice.addTickables(tickables);

            new Formatter().joinVoices([voice]).format([voice], width - 100);

            voice.draw(context, stave);
        }

        // Aplicação do NOVO JSON (Micro-sintaxe super leve)
        const exampleData = [
            "[D]d/4@Bem",
            "d/4@vin-",
            "e/4@dos",
            "[Bm]b/3,d/4,f#/4|",
            "g/3",
            "[A7]a/3"
        ];

        // Desenha a partitura assim que a página carrega
        window.onload = () => drawMusic(exampleData);
    </script>
</body>
</html>
