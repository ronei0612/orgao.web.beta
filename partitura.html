<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.5/build/cjs/vexflow.js"></script>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            background-color: transparent;
            overflow-x: auto;
            display: flex;
            align-items: center;
            min-height: 100vh;
        }

        #output {
            min-width: max-content;
            padding: 20px;
        }

        .dark-mode-svg {
            filter: invert(1) hue-rotate(180deg);
        }
    </style>
</head>
<body>
    <div id="output"></div>

    <script>
        const { Renderer, Stave, StaveNote, Voice, Formatter, ChordSymbol, BarNote, Annotation, Accidental } = Vex.Flow;

        function normalizeItem(item) {
            let str = String(item).trim();
            let chord = "", lyric = "", bar = false;
            if (str.startsWith('[')) {
                let closeIdx = str.indexOf(']');
                if (closeIdx !== -1) {
                    chord = str.substring(1, closeIdx);
                    str = str.substring(closeIdx + 1);
                }
            }
            if (str.endsWith('|')) { bar = true; str = str.slice(0, -1); }
            if (str.includes('@')) {
                let parts = str.split('@');
                lyric = parts[1];
                str = parts[0];
            }
            let notes = str.split(',').map(n => n.trim());
            if (notes.length === 1 && notes[0] === "") notes = ["b/4"];
            return { notes, chord, lyric, bar };
        }

        // FUNÇÃO PRINCIPAL QUE LÊ DO LOCALSTORAGE
        window.loadFromLocalStorage = function () {
            const urlParams = new URLSearchParams(window.location.search);
            const songName = 'asdf';//urlParams.get('music');

            if (!songName) return;

            // Busca o objeto 'saves'
            const saves = JSON.parse(localStorage.getItem('saves') || '{}');
            const musicData = saves[songName];

            if (!musicData || !musicData.chords) return;

            // Verifica modo escuro (baseado no localStorage ou classe do pai)
            const isDark = localStorage.getItem('darkMode') === 'true';

            const rawLines = musicData.chords.split('\n').filter(l => l.trim() !== '');
            render(rawLines, isDark);
        };

        function render(rawNanoData, isDarkMode) {
            const outputDiv = document.getElementById('output');
            outputDiv.innerHTML = '';

            if (isDarkMode) outputDiv.classList.add('dark-mode-svg');
            else outputDiv.classList.remove('dark-mode-svg');

            const data = rawNanoData.map(normalizeItem);
            const renderer = new Renderer(outputDiv, Renderer.Backends.SVG);

            // Ajuste de largura baseado na quantidade de notas
            const width = Math.max(window.innerWidth - 40, data.length * 110);
            renderer.resize(width, 250);

            const context = renderer.getContext();
            const stave = new Stave(10, 40, width - 20);
            stave.addClef("treble").setContext(context).draw();

            const tickables = data.flatMap(item => {
                const note = new StaveNote({ keys: item.notes, duration: "q" });

                item.notes.forEach((keyName, i) => {
                    const match = keyName.match(/([a-g])([#b])\//i);
                    if (match) note.addModifier(new Accidental(match[2]), i);
                });

                if (note.getStem()) note.getStem().hide = true;

                if (item.chord) {
                    note.addModifier(new ChordSymbol().setFont('Arial', 12, 'bold').addText(item.chord));
                }

                if (item.lyric) {
                    note.addModifier(new Annotation(item.lyric)
                        .setFont('Serif', 12, 'italic')
                        .setVerticalJustification(Annotation.VerticalJustify.BOTTOM));
                }

                return item.bar ? [note, new BarNote()] : [note];
            });

            const voice = new Voice({ num_beats: data.length, beat_value: 4 });
            voice.addTickables(tickables);
            new Formatter().joinVoices([voice]).format([voice], width - 100);
            voice.draw(context, stave);
        }

        // Inicia automaticamente ao carregar a página
        window.onload = loadFromLocalStorage;
    </script>
</body>
</html>
