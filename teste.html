<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interface Musical</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.bootstrap5.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Menu Lateral (Offcanvas) -->
    <div class="offcanvas offcanvas-start" tabindex="-1" id="sideMenu" aria-labelledby="sideMenuLabel">
        <div class="offcanvas-header border-bottom">
            <h5 class="offcanvas-title fw-bold" id="sideMenuLabel">
                <i class="fas fa-cog me-2"></i><span data-i18n="settingsTitle">Configurações</span>
            </h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body">
            <p class="text-muted mb-4" data-i18n="settingsDesc">Ajuste as preferências do aplicativo.</p>

            <div class="d-flex gap-2 justify-content-center mb-4">
                <button class="btn btn-setting-circle" id="btn-theme-toggle" title="Alternar Tema">
                    <i class="bi bi-moon-fill fs-5" id="icon-theme"></i>
                </button>
                <button class="btn btn-setting-circle" id="btn-language-toggle" title="Alternar Idioma">
                    <span class="fs-4" id="icon-flag">🇧🇷</span>
                </button>
            </div>

            <hr class="my-4">

            <!-- Links Azuis de Download e Importação -->
            <div class="d-flex flex-column gap-2 ps-2">
                <a href="#" class="text-decoration-none link-primary py-1" data-bs-toggle="modal" data-bs-target="#exportModal">
                    <i class="fas fa-download me-2"></i><span data-i18n="downloadRepertoire">Baixar meu Repertório</span>
                </a>
                <a href="#" class="text-decoration-none link-primary py-1" data-bs-toggle="modal" data-bs-target="#importModal">
                    <i class="fas fa-upload me-2"></i><span data-i18n="importRepertoire">Importar um Repertório</span>
                </a>
            </div>
        </div>
    </div>

    <div class="app-container">

        <!-- Barra Superior -->
        <div class="row g-1 align-items-center mb-1 flex-shrink-0">
            <div class="col-12 col-md-auto d-flex gap-1 align-items-center">

                <button class="btn-menu-icon flex-shrink-0" data-bs-toggle="offcanvas" data-bs-target="#sideMenu">
                    <i class="fas fa-bars icon-menu"></i>
                </button>

                <div class="input-group">
                    <button class="btn btn-teal px-3" id="btn-key-down"><i class="fas fa-minus"></i></button>
                    <select class="form-select text-center fw-bold" id="key-select">
                        <option value="0">C</option>
                        <option value="1">C#</option>
                        <option value="2">D</option>
                        <option value="3">Eb</option>
                        <option value="4">E</option>
                        <option value="5">F</option>
                        <option value="6">F#</option>
                        <option value="7">G</option>
                        <option value="8">G#</option>
                        <option value="9">A</option>
                        <option value="10">Bb</option>
                        <option value="11">B</option>
                    </select>
                    <button class="btn btn-teal px-3" id="btn-key-up"><i class="fas fa-plus"></i></button>
                </div>

                <div class="input-group">
                    <button class="btn btn-teal">-5</button>
                    <button class="btn btn-teal border-start"><i class="fas fa-minus"></i></button>
                    <input type="number" class="form-control custom-bpm fw-bold" value="90">
                    <button class="btn btn-teal">+5</button>
                </div>
            </div>

            <!-- Seleção e Ações de Música -->
            <div class="col-12 col-md">
                <div class="input-group flex-nowrap" id="song-control-group">
                    <div id="wrapper-song-select" class="flex-grow-1" style="min-width: 0;">
                        <select id="song-select" autocomplete="off" placeholder="Escolha a Música...">
                            <option value=""></option>
                        </select>
                    </div>
                    <input type="text" id="song-title-input" class="form-control d-none" data-i18n-placeholder="songTitlePlaceholder" placeholder="Título da música...">

                    <button class="btn btn-teal px-3 force-rounded-end" id="btn-action-toggle" title="Ações"><i class="fas fa-plus"></i></button>

                    <button class="btn btn-success d-none" id="btn-action-add" title="Adicionar"><i class="fas fa-file-medical"></i></button>
                    <button class="btn btn-info text-white d-none" id="btn-action-edit" title="Editar"><i class="fas fa-edit"></i></button>
                    <button class="btn btn-danger force-rounded-end d-none" id="btn-action-delete" title="Excluir"><i class="fas fa-trash"></i></button>

                    <button class="btn btn-primary d-none border-start border-white" id="btn-action-save" title="Salvar"><i class="fas fa-save"></i></button>
                    <button class="btn btn-danger force-rounded-end d-none border-start border-white" id="btn-action-cancel" title="Cancelar"><i class="fas fa-times"></i></button>
                </div>
            </div>
        </div>

        <!-- Tela Principal -->
        <div class="main-display mb-2" id="main-display" contenteditable="false"></div>

        <div class="input-group mb-2 flex-nowrap flex-shrink-0">
            <select class="form-select text-secondary" id="rhythm-select">
                <option data-i18n="noRhythm">Sem ritmo</option>
            </select>
            <button class="btn btn-secondary fw-bold px-4" data-i18n="organ">ÓRGÃO</button>
        </div>

        <div class="d-flex justify-content-center gap-3 mb-2 flex-shrink-0">
            <button class="btn-circle btn-play" id="btn-play"><i class="fas fa-play" id="icon-play"></i></button>
            <button class="btn-circle btn-music" id="btn-music"><i class="bi bi-music-note" id="icon-music"></i></button>
        </div>

        <!-- Acordes -->
        <div class="d-flex flex-column align-items-center gap-2 mb-2 flex-shrink-0">
            <div class="d-flex justify-content-center gap-2">
                <button class="chord-btn bg-degree-gray" data-interval="10" data-type="">Bb</button>
                <button class="chord-btn bg-degree-gray" data-interval="9" data-type="">A</button>
                <button class="chord-btn bg-degree-gray" data-interval="11" data-type="°">B°</button>
                <button class="chord-btn bg-degree-gray" data-interval="4" data-type="">E</button>
                <button class="chord-btn bg-degree-gray" data-interval="2" data-type="">D</button>
            </div>
            <div class="d-flex justify-content-center flex-wrap gap-2">
                <button class="chord-btn bg-degree-1" data-interval="0" data-type="">C</button>
                <button class="chord-btn bg-degree-6" data-interval="9" data-type="m">Am</button>
                <button class="chord-btn bg-degree-4" data-interval="5" data-type="">F</button>
                <button class="chord-btn bg-degree-2" data-interval="2" data-type="m">Dm</button>
                <button class="chord-btn bg-degree-5" data-interval="7" data-type="">G</button>
                <button class="chord-btn bg-degree-3" data-interval="4" data-type="m">Em</button>
            </div>
        </div>

        <!-- Wrapper do Piano (Com sombras de contorno laterais) -->
        <div class="piano-wrapper flex-shrink-0 mt-auto">
            <div class="scroll-shadow scroll-shadow-left d-none"></div>
            <div class="scroll-shadow scroll-shadow-right d-none"></div>

            <div class="piano-container" id="piano-container">
                <div class="piano">
                    <!-- Oitava 3 -->
                    <div class="key white"><span>C3</span></div>
                    <div class="key black"><span>C#3</span></div>
                    <div class="key white"><span>D3</span></div>
                    <div class="key black"><span>D#3</span></div>
                    <div class="key white"><span>E3</span></div>
                    <div class="key white"><span>F3</span></div>
                    <div class="key black"><span>F#3</span></div>
                    <div class="key white"><span>G3</span></div>
                    <div class="key black"><span>G#3</span></div>
                    <div class="key white"><span>A3</span></div>
                    <div class="key black"><span>A#3</span></div>
                    <div class="key white"><span>B3</span></div>
                    <!-- Oitava 4 -->
                    <div class="key white"><span>C4</span></div>
                    <div class="key black"><span>C#4</span></div>
                    <div class="key white"><span>D4</span></div>
                    <div class="key black"><span>D#4</span></div>
                    <div class="key white"><span>E4</span></div>
                    <div class="key white"><span>F4</span></div>
                    <div class="key black"><span>F#4</span></div>
                    <div class="key white"><span>G4</span></div>
                    <div class="key black"><span>G#4</span></div>
                    <div class="key white"><span>A4</span></div>
                    <div class="key black"><span>A#4</span></div>
                    <div class="key white"><span>B4</span></div>
                    <!-- Oitava 5 -->
                    <div class="key white"><span>C5</span></div>
                    <div class="key black"><span>C#5</span></div>
                    <div class="key white"><span>D5</span></div>
                    <div class="key black"><span>D#5</span></div>
                    <div class="key white"><span>E5</span></div>
                    <div class="key white"><span>F5</span></div>
                    <div class="key black"><span>F#5</span></div>
                    <div class="key white"><span>G5</span></div>
                    <div class="key black"><span>G#5</span></div>
                    <div class="key white"><span>A5</span></div>
                    <div class="key black"><span>A#5</span></div>
                    <div class="key white"><span>B5</span></div>
                    <!-- Tecla Final (Dó 6) -->
                    <div class="key white"><span>C6</span></div>
                </div>
            </div>
        </div>

    </div>

    <!-- Modais -->
    <div class="modal fade" id="confirmModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-sm modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-0 pb-0">
                    <h6 class="modal-title fw-bold" id="confirmModalTitle" data-i18n="confirmSaveTitle">Confirmar</h6>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body py-3" id="confirmModalBody" data-i18n="confirmSaveBody">Tem certeza?</div>
                <div class="modal-footer border-0 pt-0">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal" id="btn-confirm-no" data-i18n="no">Não</button>
                    <button type="button" class="btn btn-teal btn-sm text-white" id="btn-confirm-yes" data-i18n="yes">Sim</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="exportModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" data-i18n="exportTitle">Exportar Repertório</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="form-check mb-3 border-bottom pb-2">
                        <input class="form-check-input" type="checkbox" id="export-select-all" checked>
                        <label class="form-check-label fw-bold" for="export-select-all" data-i18n="selectAll">Selecionar Tudo</label>
                    </div>
                    <div id="export-list" class="d-flex flex-column gap-2" style="max-height: 250px; overflow-y: auto;"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" data-i18n="cancel">Cancelar</button>
                    <button type="button" class="btn btn-teal" id="btn-confirm-export" data-i18n="downloadRepertoire">Baixar</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="importModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" data-i18n="importTitle">Importar Repertório</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input class="form-control mb-3" type="file" id="import-file-input" accept=".json">
                    <div id="import-selection-area" class="d-none">
                        <div class="form-check mb-3 border-bottom pb-2">
                            <input class="form-check-input" type="checkbox" id="import-select-all" checked>
                            <label class="form-check-label fw-bold" for="import-select-all" data-i18n="selectAll">Selecionar Tudo</label>
                        </div>
                        <div id="import-list" class="d-flex flex-column gap-2" style="max-height: 250px; overflow-y: auto;"></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" data-i18n="cancel">Cancelar</button>
                    <button type="button" class="btn btn-teal d-none" id="btn-confirm-import" data-i18n="importRepertoire">Importar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
